name: Build installers

# Builds both installers on GitHub-hosted runners - no local Mac or Windows
# machine needed for either:
#   - packaging/windows-installer/BinWatcher.iss -> Setup.exe (Inno Setup)
#   - packaging/build-dmg.sh                     -> BinWatcher.dmg (hdiutil)
# Runs automatically whenever a GitHub Release is published, and attaches
# both files to that same release. Can also be run manually from the
# Actions tab for a one-off test build (as plain downloadable artifacts,
# not attached to any release).

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\windows-installer\BinWatcher.iss

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BinWatcherSetup
          path: packaging/dist/BinWatcherSetup.exe

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: packaging/dist/BinWatcherSetup.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: bash packaging/build-dmg.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BinWatcherDMG
          path: packaging/dist/BinWatcher.dmg

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: packaging/dist/BinWatcher.dmg
